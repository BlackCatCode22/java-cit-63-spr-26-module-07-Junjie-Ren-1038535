<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard</title>
    <style>
        /* This is the CSS that makes it look "Professional" */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container { display: flex; gap: 30px; }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 220px;
            border: 1px solid #eee;
        }
        .city-name { font-size: 1.2rem; color: #777; font-weight: bold; margin-bottom: 10px; }
        .temp { font-size: 3.5rem; font-weight: bold; color: #2c3e50; margin: 10px 0; }
        .desc { color: #34495e; font-style: italic; margin-bottom: 20px; }
        .weather-icon { width: 100px; height: 100px; border-radius: 50%; background: #ebf5fb; }
    </style>
</head>
<body>

<div class="container">
    <div th:each="city : ${cities}" class="card">
        <div class="city-name" th:text="${city.cityName}">City</div>
        <div class="temp"><span th:text="${city.temperature}">--</span>°F</div>
        <div class="desc" th:text="${city.shortForecast}">Loading...</div>
        <img class="weather-icon" th:src="${city.iconUrl}" alt="icon">
    </div>
</div>

</body>
</html>
